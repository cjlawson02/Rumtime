name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  firmware:
    name: Build bench-rig firmware
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: firmware/bench-rig

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Cache PlatformIO
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
          key: ${{ runner.os }}-pio-${{ hashFiles('firmware/bench-rig/platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install PlatformIO Core
        run: pip install --upgrade platformio

      - name: Build firmware
        run: pio run

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v7
        with:
          name: bench-rig-firmware-${{ github.sha }}
          path: |
            firmware/bench-rig/.pio/build/esp32-s3-devkitc-1/firmware.bin
            firmware/bench-rig/.pio/build/esp32-s3-devkitc-1/firmware.elf
          if-no-files-found: error
          retention-days: 14
